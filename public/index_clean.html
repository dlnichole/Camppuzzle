// Generate Google Calendar URL for a week-long event
function makeGCalUrl(title, startDate, endDate, description, location){
  const fmt = d=>d.replace(/-/g,"");
  const enc = encodeURIComponent;
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${enc(title)}&dates=${fmt(startDate)}/${fmt(endDate)}&details=${enc(description)}&location=${enc(location)}`;
}

// Generate ICS content for calendar download
function makeICS(events){
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//CampPuzzle//EN"];
  events.forEach(ev=>{
    lines.push("BEGIN:VEVENT",
      `DTSTART;VALUE=DATE:${ev.start.replace(/-/g,"")}`,
      `DTEND;VALUE=DATE:${ev.end.replace(/-/g,"")}`,
      `SUMMARY:${ev.title}`,
      `DESCRIPTION:${ev.description.replace(/\n/g,"\\n")}`,
      `LOCATION:${ev.location}`,
      "END:VEVENT");
  });
  lines.push("END:VCALENDAR");
  return lines.join("\r\n");
}

function addDays(dateStr, n){
  const d=new Date(dateStr); d.setDate(d.getDate()+n);
  return d.toISOString().split("T")[0];
}

function ScheduleSection({aiSchedule,kids,carePrefs,registeredWeeks,onToggleRegistered}){

  const campById=Object.fromEntries(allCamps.map(c=>[c.id,c]));
  const [exportOpen,setExportOpen]=useState(false);

  const sharedDropoffs=aiSchedule.filter(wk=>{
    const campIds=[...new Set(wk.assignments.map(a=>a.campId))];
    return campIds.length<wk.assignments.length;
  });

  const kidTotals={};
  aiSchedule.forEach(wk=>{
    wk.assignments.forEach(a=>{
      const camp=campById[a.campId]; if(!camp) return;
      const p=carePrefs[camp.id]||{};
      kidTotals[a.kidIndex]=(kidTotals[a.kidIndex]||0)+camp.weeklyRateNum+(p.before?camp.beforeCareNum:0)+(p.after?camp.afterCareNum:0);
    });
  });
  const grandTotal=Object.values(kidTotals).reduce((s,v)=>s+v,0);

  // Build calendar events from registered weeks
  const calEvents=[];
  aiSchedule.forEach(wk=>{
    if(!registeredWeeks.has(wk.weekId)) return;
    const startDate=WEEK_DATES[wk.weekId];
    if(!startDate) return;
    wk.assignments.forEach(a=>{
      const camp=campById[a.campId]; if(!camp) return;
      const p=carePrefs[camp.id]||{};
      const desc=`${a.kidName} at ${camp.name}\nDrop-off: ${camp.dropoffTime} . Pick-up: ${camp.pickupTime}\n${camp.providesLunch?"Lunch provided":"Bring lunch"}\n${p.before?"Before care . ":""}${p.after?"After care":""}`.trim();
      // Mon-Fri of the week
      for(let d=0;d<5;d++){
        calEvents.push({title:`${a.kidName} - ${camp.name}`,start:addDays(startDate,d),end:addDays(startDate,d+1),description:desc,location:camp.location});
      }
    });
  });

  const handlePrint=()=>window.print();

  const handleDownloadICS=()=>{
    const ics=makeICS(calEvents);
    const blob=new Blob([ics],{type:"text/calendar"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="CampPuzzle-Schedule.ics"; a.click();
    URL.revokeObjectURL(url);
  };

  const registeredCount=registeredWeeks.size;

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"16px",flexWrap:"wrap"}}>
        <h2 style={{...sectionHeading,margin:0}}>? Your Puzzle Schedule</h2>
        <span style={{fontSize:"12px",background:"#4F7FFF18",color:"#4F7FFF",padding:"3px 10px",borderRadius:"20px",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>AI Proposed</span>
      </div>
      <p style={{fontSize:"13px",color:"#64748b",fontFamily:"'DM Sans',sans-serif",margin:"0 0 16px"}}>Check the weeks you've registered for - then export your schedule.</p>

      {sharedDropoffs.length>0&&(
        <div style={{background:"#6BCB7718",border:"1.5px solid #6BCB77",borderRadius:"12px",padding:"14px 16px",marginBottom:"16px"}}>
          <p style={{margin:"0 0 5px",fontSize:"14px",color:"#1a5c2a",fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>? Same drop-off weeks!</p>
          {sharedDropoffs.map((wk,i)=><p key={i} style={{margin:"2px 0",fontSize:"13px",color:"#2d6a3f",fontFamily:"'DM Sans',sans-serif"}}><strong>{wk.weekLabel}:</strong> {wk.assignments.map(a=>a.kidName).join(" & ")} ? {campById[wk.assignments[0].campId]?.name}</p>)}
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:"12px",marginBottom:"24px"}}>
        {aiSchedule.map((wk,wi)=>{
          const isRegistered=registeredWeeks.has(wk.weekId);
          const weekTotal=wk.assignments.reduce((s,a)=>{
            const camp=campById[a.campId]; if(!camp) return s;
            const p=carePrefs[camp.id]||{};
            return s+camp.weeklyRateNum+(p.before?camp.beforeCareNum:0)+(p.after?camp.afterCareNum:0);
          },0);
          return(
            <div key={wi} style={{background:"#fff",borderRadius:"14px",border:isRegistered?"1.5px solid #6BCB77":"1.5px solid #e2e8f0",overflow:"hidden",boxShadow:isRegistered?"0 0 0 1px #6BCB7740":undefined,transition:"all 0.2s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",background:isRegistered?"#6BCB7710":"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
                <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                  <button onClick={()=>onToggleRegistered(wk.weekId)} style={{width:22,height:22,borderRadius:"6px",border:isRegistered?"2px solid #6BCB77":"2px solid #cbd5e1",background:isRegistered?"#6BCB77":"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,transition:"all 0.15s"}}>
                    {isRegistered&&<span style={{color:"#fff",fontSize:"12px",fontWeight:700}}>?</span>}
                  </button>
                  <p style={{margin:0,fontSize:"13px",fontWeight:700,color:isRegistered?"#1a5c2a":"#475569",textTransform:"uppercase",letterSpacing:"0.05em",fontFamily:"'DM Sans',sans-serif"}}>{wk.weekLabel}</p>
                  {isRegistered&&<span style={{fontSize:"11px",background:"#6BCB7720",color:"#2d8a4e",padding:"2px 8px",borderRadius:"20px",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>Registered</span>}
                </div>
                <span style={{fontSize:"14px",fontWeight:800,color:"#4F7FFF",fontFamily:"'DM Sans',sans-serif"}}>${weekTotal}</span>
              </div>
              <div style={{padding:"10px 14px",display:"flex",flexDirection:"column",gap:"8px"}}>
                {wk.assignments.map((a,ai)=>{
                  const camp=campById[a.campId]; if(!camp) return null;
                  const p=carePrefs[camp.id]||{};
                  const bc=p.before?camp.beforeCareNum:0;
                  const ac=p.after?camp.afterCareNum:0;
                  const kidCost=camp.weeklyRateNum+bc+ac;
                  const color=COLORS[a.kidIndex%COLORS.length];
                  return(
                    <div key={ai} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"10px 12px",background:color+"0A",borderRadius:"10px",border:`1px solid ${color}25`}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"3px",flexWrap:"wrap"}}>
                          <span style={{width:8,height:8,borderRadius:"50%",background:color,display:"inline-block",flexShrink:0}}/>
                          <span style={{fontSize:"13px",fontWeight:700,color:"#1e293b",fontFamily:"'DM Sans',sans-serif"}}>{a.kidName}</span>
                          <span style={{fontSize:"11px",padding:"1px 8px",background:a.type==="Full Day"?"#4F7FFF18":a.type==="Sleepaway"?"#6BCB7720":"#FFB34718",color:a.type==="Full Day"?"#4F7FFF":a.type==="Sleepaway"?"#2d8a4e":"#b36a00",borderRadius:"20px",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>{a.type}</span>
                        </div>
                        <p style={{margin:"1px 0",fontSize:"13px",color:"#475569",fontFamily:"'DM Sans',sans-serif"}}>{a.campName}</p>
                        <p style={{margin:"1px 0",fontSize:"12px",color:"#64748b",fontFamily:"'DM Sans',sans-serif"}}>? Drop-off {camp.dropoffTime} . Pick-up {camp.pickupTime}</p>
                        <p style={{margin:"1px 0",fontSize:"12px",fontWeight:600,color:camp.providesLunch?"#2d8a4e":"#e07000",fontFamily:"'DM Sans',sans-serif"}}>{camp.providesLunch?"? Lunch provided":"? Bring lunch"}</p>
                        {(bc>0||ac>0)&&<p style={{margin:"1px 0",fontSize:"12px",color:"#94a3b8",fontFamily:"'DM Sans',sans-serif"}}>{bc>0?`Before care $${bc}`:""}{ bc>0&&ac>0?" . ":""}{ac>0?`After care $${ac}`:""}</p>}
                      </div>
                      <span style={{fontSize:"14px",fontWeight:700,color:"#1e293b",fontFamily:"'DM Sans',sans-serif",flexShrink:0,paddingLeft:"10px"}}>${kidCost}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* Cost summary */}
      <div style={{background:"linear-gradient(135deg,#4F7FFF0D,#6BCB770D)",border:"1.5px solid #4F7FFF30",borderRadius:"14px",padding:"18px 20px",marginBottom:"20px"}}>
        <p style={{margin:"0 0 12px",fontFamily:"'DM Serif Display',serif",fontSize:"18px",color:"#1e293b"}}>? Total Cost Summary</p>
        {Object.entries(kidTotals).map(([idx,total])=>{
          const kid=kids[parseInt(idx)];
          const color=COLORS[parseInt(idx)%COLORS.length];
          return(
            <div key={idx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #e2e8f020"}}>
              <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                <span style={{width:10,height:10,borderRadius:"50%",background:color,display:"inline-block"}}/>
                <span style={{fontSize:"14px",color:"#475569",fontFamily:"'DM Sans',sans-serif"}}>{kid?.name||`Child ${parseInt(idx)+1}`} ({aiSchedule.length} weeks)</span>
              </div>
              <span style={{fontSize:"15px",fontWeight:700,color:"#1e293b",fontFamily:"'DM Sans',sans-serif"}}>${total}</span>
            </div>
          );
        })}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"12px",paddingTop:"12px",borderTop:"1.5px solid #4F7FFF30"}}>
          <span style={{fontWeight:700,color:"#1e293b",fontSize:"16px",fontFamily:"'DM Sans',sans-serif"}}>Grand Total ({aiSchedule.length} weeks)</span>
          <span style={{fontWeight:800,color:"#4F7FFF",fontSize:"22px",fontFamily:"'DM Sans',sans-serif"}}>${grandTotal}</span>
        </div>
        <p style={{margin:"8px 0 0",fontSize:"12px",color:"#94a3b8",fontFamily:"'DM Sans',sans-serif"}}>Estimates only - confirm pricing directly with each camp</p>
      </div>

      {/* Export panel */}
      <div style={{border:"1.5px solid #e2e8f0",borderRadius:"14px",overflow:"hidden",marginBottom:"16px"}}>
        <button onClick={()=>setExportOpen(o=>!o)} style={{width:"100%",padding:"14px 18px",background:"#fff",border:"none",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
          <span style={{fontSize:"15px",fontWeight:700,color:"#1e293b"}}>? Export & Share Schedule</span>
          <span style={{fontSize:"18px",color:"#94a3b8",transition:"transform 0.2s",transform:exportOpen?"rotate(180deg)":"none"}}>?</span>
        </button>
        {exportOpen&&(
          <div style={{padding:"16px 18px",borderTop:"1px solid #f1f5f9",background:"#fafbfc",display:"flex",flexDirection:"column",gap:"10px"}}>
            <p style={{margin:"0 0 4px",fontSize:"13px",color:"#64748b",fontFamily:"'DM Sans',sans-serif"}}>
              {registeredCount>0?`Exporting ${registeredCount} registered week${registeredCount>1?"s":""}. Check weeks above to include them.`:"Check the weeks you've registered for above, then export."}
            </p>

            <button onClick={handlePrint} style={{padding:"11px 16px",background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:"10px",fontSize:"14px",fontWeight:600,color:"#1e293b",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",textAlign:"left",display:"flex",alignItems:"center",gap:"10px"}}>
              <span style={{fontSize:"20px"}}>??</span>
              <div>
                <div>Print Schedule</div>
                <div style={{fontSize:"12px",color:"#94a3b8",fontWeight:400}}>Opens browser print dialog</div>
              </div>
            </button>

            <button onClick={handleDownloadICS} disabled={registeredCount===0} style={{padding:"11px 16px",background:registeredCount>0?"#fff":"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:"10px",fontSize:"14px",fontWeight:600,color:registeredCount>0?"#1e293b":"#94a3b8",cursor:registeredCount>0?"pointer":"not-allowed",fontFamily:"'DM Sans',sans-serif",textAlign:"left",display:"flex",alignItems:"center",gap:"10px"}}>
              <span style={{fontSize:"20px"}}>?</span>
              <div>
                <div>Download .ics File</div>
                <div style={{fontSize:"12px",color:"#94a3b8",fontWeight:400}}>Works with Apple Calendar, Outlook & more</div>
              </div>
            </button>

            {registeredCount>0?(
              <div style={{background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:"10px",padding:"12px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}}>
                  <span style={{fontSize:"20px"}}>?</span>
                  <div>
                    <div style={{fontSize:"14px",fontWeight:600,color:"#1e293b",fontFamily:"'DM Sans',sans-serif"}}>Add to Google Calendar</div>
                    <div style={{fontSize:"12px",color:"#94a3b8",fontFamily:"'DM Sans',sans-serif"}}>One event per week per child</div>
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                  {aiSchedule.filter(wk=>registeredWeeks.has(wk.weekId)).flatMap(wk=>wk.assignments.map(a=>{
                    const camp=campById[a.campId]; if(!camp) return null;
                    const startDate=WEEK_DATES[wk.weekId];
                    const endDate=addDays(startDate,5);
                    const p=carePrefs[camp.id]||{};
                    const desc=`${a.kidName} at ${camp.name}. Drop-off: ${camp.dropoffTime}, Pick-up: ${camp.pickupTime}. ${camp.providesLunch?"Lunch provided.":"Bring lunch."} ${p.before?"Before care included.":""} ${p.after?"After care included.":""}`.trim();
                    const url=makeGCalUrl(`${a.kidName} - ${camp.name}`,startDate,endDate,desc,camp.location);
                    const color=COLORS[a.kidIndex%COLORS.length];
                    return(
                      <a key={`${wk.weekId}-${a.kidIndex}`} href={url} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 10px",background:color+"0D",borderRadius:"8px",textDecoration:"none",border:`1px solid ${color}25`}}>
                        <span style={{width:8,height:8,borderRadius:"50%",background:color,flexShrink:0}}/>
                        <span style={{fontSize:"13px",color:"#1e293b",fontFamily:"'DM Sans',sans-serif",flex:1}}>{a.kidName} . {wk.weekLabel}</span>
                        <span style={{fontSize:"12px",color:"#4F7FFF",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>Add ?</span>
                      </a>
                    );
                  })).filter(Boolean)}
                </div>
              </div>
            ):(
              <div style={{padding:"11px 16px",background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:"10px",fontSize:"13px",color:"#94a3b8",fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{fontSize:"20px"}}>?</span> Check registered weeks above to generate Google Calendar links
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function newKid(i){return{id:Date.now()+i,name:"",age:"",interests:[],dayType:"Either",weeks:[]};}

function CampPuzzle(){
  const [step,setStep]=useState("setup");
  const [location,setLocation]=useState("Huntersville, NC");
  const [radius,setRadius]=useState("15");
  const [kids,setKids]=useState([
    {id:0,name:"",age:"",interests:[],dayType:"Either",weeks:[]},
    {id:1,name:"",age:"",interests:[],dayType:"Either",weeks:[]},
  ]);
  const [carePrefs,setCarePrefs]=useState({});
  const [selectedDayCamps,setSelectedDayCamps]=useState(new Set(DAY_CAMPS.map(c=>c.id)));
  const [selectedSleepaway,setSelectedSleepaway]=useState(new Set());
  const [campTab,setCampTab]=useState("day"); // "day" | "sleepaway"
  const [showSchedule,setShowSchedule]=useState(false);
  const [building,setBuilding]=useState(false);
  const [registeredWeeks,setRegisteredWeeks]=useState(new Set());
  const [error,setError]=useState(null);

  const setCamp=(id,prefs)=>setCarePrefs(p=>({...p,[id]:prefs}));
  const carePrefsWithSetter={...carePrefs,_set:setCamp};
  const addKid=()=>{if(kids.length<4)setKids([...kids,newKid(kids.length)]);};
  const removeKid=idx=>setKids(kids.filter((_,i)=>i!==idx));
  const updateKid=(idx,u)=>{const n=[...kids];n[idx]=u;setKids(n);};
  const kidSummaries=kids.map((k,i)=>({...k,index:i,name:k.name||`Child ${i+1}`}));

  const toggleDay=id=>setSelectedDayCamps(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  const toggleSleepaway=id=>setSelectedSleepaway(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  const toggleRegistered=weekId=>setRegisteredWeeks(prev=>{const n=new Set(prev);n.has(weekId)?n.delete(weekId):n.add(weekId);return n;});

  const totalSelected=selectedDayCamps.size+selectedSleepaway.size;
  const buildSchedule=()=>{
    if(totalSelected===0){setError("Please select at least one camp.");return;}
    setError(null);setBuilding(true);
    setTimeout(()=>{setBuilding(false);setShowSchedule(true);},1200);
  };

  return(
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap');
        *{box-sizing:border-box;} body{margin:0;}
        @media print{
          .no-print{display:none!important;}
          body{background:#fff;}
          .print-card{break-inside:avoid;}
        }
      `}</style>
      <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#f0f4ff 0%,#fafbff 60%,#f0fff4 100%)",fontFamily:"'DM Sans',sans-serif"}}>

        {/* Header */}
        <div className="no-print" style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",height:"60px",position:"sticky",top:0,zIndex:10,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
            <div style={{width:34,height:34,borderRadius:"10px",background:"linear-gradient(135deg,#4F7FFF,#6BCB77)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px"}}>?</div>
            <div>
              <span style={{fontFamily:"'DM Serif Display',serif",fontSize:"19px",color:"#1e293b",display:"block",lineHeight:1.1}}>CampPuzzle</span>
              <span style={{fontSize:"10px",color:"#94a3b8",fontFamily:"'DM Sans',sans-serif",letterSpacing:"0.04em",textTransform:"uppercase"}}>piece together the perfect summer</span>
            </div>
          </div>
          <button onClick={()=>{setStep(step==="setup"?"results":"setup");setShowSchedule(false);}} style={{border:"1.5px solid #e2e8f0",background:"#fff",borderRadius:"8px",padding:"6px 14px",fontSize:"13px",color:"#475569",cursor:"pointer",fontWeight:600}}>
            {step==="setup"?"View Camps ?":"? Edit Kids"}
          </button>
        </div>

        <div style={{maxWidth:"720px",margin:"0 auto",padding:"28px 16px 60px"}}>

          {/* SETUP */}
          {step==="setup"&&(<>
            <div style={{textAlign:"center",marginBottom:"28px"}}>
              <h1 style={{fontFamily:"'DM Serif Display',serif",fontSize:"clamp(26px,6vw,38px)",color:"#1e293b",margin:"0 0 8px",lineHeight:1.2}}>Piece together the<br/><span style={{color:"#4F7FFF"}}>perfect summer</span></h1>
              <p style={{color:"#64748b",fontSize:"15px",margin:0}}>Tell us about your kids and which weeks you need.</p>
            </div>
            <div style={{background:"#fff",borderRadius:"16px",border:"1.5px solid #e2e8f0",padding:"22px",marginBottom:"16px",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
              <h2 style={{...sectionHeading,marginBottom:"16px"}}>? Location</h2>
              <div style={{display:"flex",gap:"12px",flexWrap:"wrap"}}>
                <div style={{flex:2,minWidth:"160px"}}><label style={labelStyle}>City, State or ZIP</label><input value={location} onChange={e=>setLocation(e.target.value)} placeholder="e.g. Charlotte, NC" style={inputStyle}/></div>
                <div style={{flex:1,minWidth:"100px"}}><label style={labelStyle}>Day Camp Radius</label><select value={radius} onChange={e=>setRadius(e.target.value)} style={{...inputStyle,cursor:"pointer"}}>{["5","10","15","25","50"].map(r=><option key={r} value={r}>{r} mi</option>)}</select></div>
              </div>
            </div>
            <div style={{marginBottom:"16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                <h2 style={sectionHeading}>? Children</h2>
                {kids.length<4&&<button onClick={addKid} style={{border:"1.5px solid #4F7FFF",background:"#fff",borderRadius:"8px",padding:"6px 14px",fontSize:"13px",color:"#4F7FFF",cursor:"pointer",fontWeight:600}}>+ Add</button>}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>{kids.map((kid,i)=><KidCard key={kid.id} kid={kid} index={i} onChange={u=>updateKid(i,u)} onRemove={()=>removeKid(i)} canRemove={kids.length>1}/>)}</div>
            </div>
            <button onClick={()=>setStep("results")} style={{width:"100%",padding:"15px",background:"linear-gradient(135deg,#4F7FFF,#6B8FFF)",color:"#fff",border:"none",borderRadius:"12px",fontSize:"16px",fontWeight:700,cursor:"pointer",boxShadow:"0 4px 16px #4F7FFF40"}}>View Matching Camps ?</button>
          </>)}

          {/* RESULTS */}
          {step==="results"&&(<>
            <div style={{marginBottom:"12px"}}>
              <h2 style={{...sectionHeading,fontSize:"24px"}}>Camps near {location}</h2>
              <p style={{color:"#64748b",margin:"4px 0 0",fontSize:"14px"}}>Tap camps you're interested in, then let AI build your schedule.</p>
            </div>

            {/* Day / Sleepaway tabs */}
            <div className="no-print" style={{display:"flex",gap:"0",marginBottom:"16px",background:"#f1f5f9",borderRadius:"12px",padding:"4px"}}>
              {[["day","? Day Camps"],["sleepaway","? Sleepaway Camps"]].map(([tab,label])=>(
                <button key={tab} onClick={()=>setCampTab(tab)} style={{flex:1,padding:"10px",borderRadius:"9px",border:"none",background:campTab===tab?"#fff":"transparent",color:campTab===tab?"#1e293b":"#64748b",fontFamily:"'DM Sans',sans-serif",fontSize:"13px",fontWeight:campTab===tab?700:500,cursor:"pointer",boxShadow:campTab===tab?"0 1px 4px rgba(0,0,0,0.08)":"none",transition:"all 0.15s"}}>{label}</button>
              ))}
            </div>

            {campTab==="day"&&(<>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#4F7FFF0D",borderRadius:"10px",border:"1px solid #4F7FFF20",marginBottom:"14px"}}>
                <span style={{fontSize:"13px",color:"#4F7FFF",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>{selectedDayCamps.size} day camp{selectedDayCamps.size!==1?"s":""} selected . radius {radius} mi</span>
                <div style={{display:"flex",gap:"8px"}}>
                  <button onClick={()=>setSelectedDayCamps(new Set(DAY_CAMPS.map(c=>c.id)))} style={{border:"none",background:"none",fontSize:"12px",color:"#4F7FFF",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>All</button>
                  <span style={{color:"#cbd5e1"}}>|</span>
                  <button onClick={()=>setSelectedDayCamps(new Set())} style={{border:"none",background:"none",fontSize:"12px",color:"#94a3b8",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>Clear</button>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:"14px",marginBottom:"8px"}}>
                {DAY_CAMPS.map(camp=><CampCard key={camp.id} camp={camp} kidSummaries={kidSummaries} carePrefs={carePrefsWithSetter} selected={selectedDayCamps.has(camp.id)} onToggleSelect={()=>toggleDay(camp.id)} isSleepaway={false}/>)}
              </div>
            </>)}

            {campTab==="sleepaway"&&(<>
              <div style={{background:"#6BCB7710",border:"1px solid #6BCB7740",borderRadius:"10px",padding:"12px 14px",marginBottom:"14px"}}>
                <p style={{margin:"0 0 4px",fontSize:"13px",fontWeight:700,color:"#1a5c2a",fontFamily:"'DM Sans',sans-serif"}}>? Sleepaway Camps - larger radius</p>
                <p style={{margin:0,fontSize:"12px",color:"#2d6a3f",fontFamily:"'DM Sans',sans-serif"}}>These camps are 50-200 miles from {location}. Kids stay overnight for 1-2 week sessions.</p>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#6BCB770D",borderRadius:"10px",border:"1px solid #6BCB7730",marginBottom:"14px"}}>
                <span style={{fontSize:"13px",color:"#2d8a4e",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>{selectedSleepaway.size} sleepaway camp{selectedSleepaway.size!==1?"s":""} selected</span>
                <div style={{display:"flex",gap:"8px"}}>
                  <button onClick={()=>setSelectedSleepaway(new Set(SLEEPAWAY_CAMPS.map(c=>c.id)))} style={{border:"none",background:"none",fontSize:"12px",color:"#2d8a4e",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>All</button>
                  <span style={{color:"#cbd5e1"}}>|</span>
                  <button onClick={()=>setSelectedSleepaway(new Set())} style={{border:"none",background:"none",fontSize:"12px",color:"#94a3b8",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>Clear</button>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:"14px",marginBottom:"8px"}}>
                {SLEEPAWAY_CAMPS.map(camp=><CampCard key={camp.id} camp={camp} kidSummaries={kidSummaries} carePrefs={carePrefsWithSetter} selected={selectedSleepaway.has(camp.id)} onToggleSelect={()=>toggleSleepaway(camp.id)} isSleepaway={true}/>)}
              </div>
            </>)}

            {error&&<div style={{background:"#FFF1F1",border:"1px solid #FF6B6B",borderRadius:"10px",padding:"12px 16px",marginBottom:"14px",color:"#cc2222",fontSize:"13px",fontFamily:"'DM Sans',sans-serif"}}>{error}</div>}

            {!showSchedule&&(
              <button onClick={buildSchedule} disabled={building} style={{width:"100%",padding:"16px",marginTop:"16px",marginBottom:"32px",background:building?"#94a3b8":"linear-gradient(135deg,#4F7FFF,#6B8FFF)",color:"#fff",border:"none",borderRadius:"12px",fontSize:"16px",fontWeight:700,cursor:building?"not-allowed":"pointer",boxShadow:building?"none":"0 4px 16px #4F7FFF40",transition:"all 0.2s"}}>
                {building?"? Building your puzzle schedule...":"? Build My Puzzle Schedule"}
              </button>
            )}

            {showSchedule&&(<>
              <div style={{marginTop:"16px"}}>
                <ScheduleSection aiSchedule={AI_SCHEDULE} kids={kidSummaries} carePrefs={carePrefs} registeredWeeks={registeredWeeks} onToggleRegistered={toggleRegistered}/>
              </div>
              <button onClick={()=>setShowSchedule(false)} className="no-print" style={{width:"100%",marginTop:"16px",padding:"12px",background:"#fff",color:"#64748b",border:"1.5px solid #e2e8f0",borderRadius:"12px",fontSize:"14px",fontWeight:600,cursor:"pointer"}}>? Adjust My Selections</button>
            </>)}
          </>)}
        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(CampPuzzle));
  </script>
</body>
</html>
